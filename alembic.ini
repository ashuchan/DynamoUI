# Alembic configuration for DynamoUI internal schema migrations.
# Manages only the dynamoui_internal PostgreSQL schema (metering tables).
# Business-data tables are never touched by Alembic.

[alembic]
script_location = alembic
prepend_sys_path = .

# The DB URL is always sourced from the application settings at runtime.
# Do NOT set sqlalchemy.url here — env.py reads it from InternalSettings.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
